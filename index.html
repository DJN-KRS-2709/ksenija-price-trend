  async function unlock(pw){
    var enc=new TextEncoder();
    var baseKey=await crypto.subtle.importKey("raw",enc.encode(pw),{name:"PBKDF2"},false,["deriveKey"]);
    var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(SALT),iterations:ITER,hash:"SHA-256"},baseKey,{name:"AES-GCM",length:256},false,["decrypt"]);
