    var baseKey=await crypto.subtle.importKey("raw",enc.encode(pw),{name:"PBKDF2"},false,["deriveKey"]);
    var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(SALT),iterations:ITER,hash:"SHA-256"},baseKey,{name:"AES-GCM",length:256},false,["decrypt"]);
    var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(IV)},key,b64(DATA));
    return new TextDecoder().decode(pt);
  }
  document.getElementById("f").addEventListener("submit",async function(ev){
    ev.preventDefault();
    var e=document.getElementById("e");e.textContent="";
    try{
      var html=await unlock(document.getElementById("pw").value);
      document.open();document.write(html);document.close();
    }catch(err){e.textContent="Incorrect password. Please try again.";}
  });
</script>
